<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE LessonsAtHome · Worksheet Generator</title>
<meta name="description" content="Free printable K-5 worksheet generator. Create math, language arts, reading, and STEM practice pages with matching answer keys, adjustable difficulty, and reproducible seeds, ready to print in seconds.">
<link rel="canonical" href="https://edulab.appalachiancloud.co/">
<!-- Inline SVG favicon (brand mark). CSP img-src allows 'self' data:, so no external file needed. -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%232563eb'/%3E%3Ctext%20x='16'%20y='23'%20font-family='sans-serif'%20font-size='21'%20font-weight='700'%20text-anchor='middle'%20fill='%23fff'%3EA%3C/text%3E%3C/svg%3E">
<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="ACE LessonsAtHome">
<meta property="og:title" content="ACE LessonsAtHome · Worksheet Generator">
<meta property="og:description" content="Printable K-5 math, language arts, reading, and STEM worksheets with answer keys. Generate, seed, and print in seconds.">
<meta property="og:url" content="https://edulab.appalachiancloud.co/">
<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="ACE LessonsAtHome · Worksheet Generator">
<meta name="twitter:description" content="Printable K-5 math, language arts, reading, and STEM worksheets with answer keys. Generate, seed, and print in seconds.">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="themes.css">
<link rel="stylesheet" href="stem.css">
</head>
<body>
<div class="app">
  <!-- ============ CONTROL PANEL ============ -->
  <aside class="controls no-print" id="controls">
    <h1>ACE LessonsAtHome</h1>
    <p class="sub">Worksheet generator · Grades K&ndash;5</p>

    <label class="field">
      <span>Subject</span>
      <select id="subject">
        <option value="math">Math</option>
        <option value="la">Language Arts</option>
        <option value="reading">Reading</option>
        <option value="stem">STEM</option>
      </select>
    </label>

    <label class="field">
      <span>Worksheet type</span>
      <select id="type"><!-- populated by app.js based on subject + grade --></select>
    </label>

    <div class="row">
      <label class="field">
        <span>Starting grade</span>
        <select id="grade">
          <option value="0">Kindergarten</option>
          <option value="1">Grade 1</option>
          <option value="2">Grade 2</option>
          <option value="3" selected>Grade 3</option>
          <option value="4">Grade 4</option>
          <option value="5">Grade 5</option>
        </select>
      </label>
      <label class="field">
        <span>Difficulty</span>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </label>
    </div>

    <label class="field" id="digitField">
      <span>Digit format (operands)</span>
      <select id="digits">
        <option value="1x1">1 &times; 1</option>
        <option value="1x2">1 &times; 2</option>
        <option value="1x3">1 &times; 3</option>
        <option value="2x2" selected>2 &times; 2</option>
        <option value="2x3">2 &times; 3</option>
        <option value="3x3">3 &times; 3</option>
      </select>
    </label>

    <label class="field">
      <span>Problems per page</span>
      <input type="number" id="count" min="1" max="120" value="48">
      <small id="countHint">Default 48 for basic arithmetic.</small>
    </label>

    <div class="row">
      <label class="field grow">
        <span>Seed (optional)</span>
        <input type="text" id="seed" placeholder="blank = random">
      </label>
      <label class="field check">
        <span>Answer key</span>
        <input type="checkbox" id="answerKey">
      </label>
    </div>

    <div class="row">
      <label class="field grow">
        <span>Fun theme</span>
        <select id="theme"><!-- populated from THEMES.list --></select>
      </label>
      <label class="field check">
        <span>Decorate</span>
        <input type="checkbox" id="themeOn">
      </label>
    </div>

    <details class="field">
      <summary>Header options</summary>
      <label class="subfield"><span>Title</span>
        <input type="text" id="title" placeholder="auto from type"></label>
      <label class="subfield check2"><span>Name &amp; date line</span>
        <input type="checkbox" id="showName" checked></label>
    </details>

    <div class="actions">
      <button id="generate" class="primary">Generate</button>
      <button id="print">Print</button>
    </div>
    <p class="seedinfo" id="seedInfo"></p>
    <p class="tip no-print">Tip: same seed + same settings = identical sheet, so a key always matches.</p>

    <footer class="support no-print" id="support"><!-- populated by support.js --></footer>
  </aside>

  <!-- ============ WORKSHEET OUTPUT ============ -->
  <main class="page-wrap" id="pageWrap">
    <div class="sheet" id="sheet"><!-- rendered worksheet --></div>
  </main>
</div>

<script src="banks.js"></script>
<script src="generator.js"></script>
<script src="themes.js"></script>
<script src="stem.js"></script>
<script src="support.js"></script>
<script src="app.js"></script>
</body>
</html>
